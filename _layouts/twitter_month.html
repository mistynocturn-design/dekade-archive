---
layout: default
---

<article class="twitter-month-page">
  <header class="twitter-month-header">
    <p class="twitter-kicker">Twitter Archive</p>
    <h1>{{ page.title }}</h1>

    {% if page.tags %}
      <div class="twitter-tags">
        {% for tag in page.tags %}
          <span>#{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="twitter-note-body">
    {{ content }}
  </div>
</article>
