---
layout: default
---

<article class="roleplay-archive-page">
  <header class="roleplay-archive-header">
    <p>{{ page.category }} Archive</p>
    <h1>{{ page.title }}</h1>
    {% if page.archive_date %}<time>{{ page.archive_date | date: "%Y-%m-%d" }}</time>{% endif %}
  </header>
  <div class="roleplay-archive-content">
    {{ content }}
  </div>
</article>
