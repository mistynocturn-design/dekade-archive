<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twitter Quick Writer</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #222; }
    main { max-width: 1040px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 24px; margin: 0 0 18px; }
    label { display: block; font-size: 13px; font-weight: 700; margin: 12px 0 6px; }
    input, textarea, select { box-sizing: border-box; width: 100%; border: 1px solid #ccd1d8; border-radius: 8px; padding: 10px 12px; font: inherit; background: #fff; }
    textarea { min-height: 150px; resize: vertical; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .panel { background: #fff; border: 1px solid #e3e6ea; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #4e4a65; color: #e7e3d8; }
    button.secondary { background: #596273; color: #fff; }
    .hint, .status { color: #646b76; font-size: 13px; line-height: 1.55; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Twitter Quick Writer</h1>
  <section class="panel">
    <div class="grid">
      <div><label for="month">Month file</label><input id="month" value="2026-06"></div>
      <div><label for="date">Post date</label><input id="date" type="date"></div>
      <div><label for="author">Author</label><select id="author"><option value="비니">비니</option><option value="녹티">녹티</option></select></div>
      <div><label for="avatar">Profile image</label><input id="avatar" placeholder="/dekade-archive/assets/twitter/2026-06/profile.jpg"></div>
      <div><label for="tags">Tags</label><input id="tags" placeholder="tag1, tag2"></div>
      <div><label for="threadId">Thread ID</label><input id="threadId" placeholder="optional"></div>
    </div>
    <label for="text">Post text</label>
    <textarea id="text" placeholder="Write one tweet here."></textarea>
    <label for="images">Images</label>
    <textarea id="images" placeholder="One image path per line. Up to 4 images." style="min-height:90px;"></textarea>
    <p class="hint">Use this for one tweet. Copy the snippet into _twitter/YYYY-MM.md. If this starts a new month, use the new-file skeleton.</p>
    <div class="actions">
      <button id="buildBtn" type="button">Build tweet</button>
      <button class="secondary" id="copySnippetBtn" type="button">Copy snippet</button>
      <button class="secondary" id="copyFileBtn" type="button">Copy new-file skeleton</button>
    </div>
    <div class="status" id="status"></div>
  </section>
  <section class="panel">
    <label for="snippetOutput">Tweet snippet</label>
    <textarea id="snippetOutput" spellcheck="false"></textarea>
  </section>
  <section class="panel">
    <label for="fileOutput">New-file skeleton</label>
    <textarea id="fileOutput" spellcheck="false"></textarea>
  </section>
</main>
<script>
function today() { return new Date().toISOString().slice(0, 10); }
function currentMonth() { return today().slice(0, 7); }
function escapeHtml(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
function yamlQuote(value) { return '"' + String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"'; }
function field(id) { return document.getElementById(id); }
function splitList(value) { return String(value || '').split(/[\n,;]+/).map(function (v) { return v.trim(); }).filter(Boolean); }
function authorStyle(author) {
  if (author === '비니') return { bg: '#e6eaf3', text: '#161732', avatar: '/dekade-archive/assets/twitter/' + field('month').value + '/bini-profile.jpg', indexAccent: '#4e4a65', indexAccentText: '#e7e3d8', indexText: '#161732', indexHover: '#ebeaef' };
  return { bg: '#f9f5f2', text: '#4f362a', avatar: '/dekade-archive/assets/twitter/' + field('month').value + '/noctea-profile.png', indexAccent: '#e7e3d8', indexAccentText: '#4e4a65', indexText: '#4f362a', indexHover: '#f9f5f2' };
}
var STORAGE_KEY = 'dekade-twitter-quick-writer';
var REMEMBERED = ['month', 'author', 'avatar', 'tags', 'threadId'];
function loadRemembered() { try { var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); REMEMBERED.forEach(function (id) { if (saved[id] && field(id)) field(id).value = saved[id]; }); } catch (error) {} }
function saveRemembered() { var saved = {}; REMEMBERED.forEach(function (id) { if (field(id)) saved[id] = field(id).value; }); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); } catch (error) {} }
function imageGridHtml(images) {
  if (!images.length) return [];
  var lines = ['  <div class="twitter-image-grid twitter-image-count-' + images.length + '">'];
  images.slice(0, 4).forEach(function (url, index) {
    lines.push('    <button class="twitter-image-button" type="button" data-twitter-image="' + escapeAttr(url) + '" aria-label="Open image ' + (index + 1) + '">');
    lines.push('      <img src="' + escapeAttr(url) + '" alt="" loading="lazy">');
    lines.push('    </button>');
  });
  lines.push('  </div>');
  return lines;
}
function buildSnippet() {
  saveRemembered();
  var date = field('date').value || today();
  var month = field('month').value || date.slice(0, 7);
  var author = field('author').value;
  var style = authorStyle(author);
  var avatar = field('avatar').value.trim() || style.avatar;
  var tags = splitList(field('tags').value);
  var text = field('text').value.trim();
  var images = splitList(field('images').value).slice(0, 4);
  var lines = [];
  lines.push('<section class="twitter-note" data-date="' + escapeAttr(date) + '" data-author="' + escapeAttr(author) + '" data-tags="' + escapeAttr(tags.join(' ')) + '" style="--twitter-note-bg:' + style.bg + ';--twitter-note-text:' + style.text + ';">');
  lines.push('  <div class="twitter-note-header">');
  lines.push('    <img class="twitter-note-avatar" src="' + escapeAttr(avatar) + '" alt="">');
  lines.push('    <div>');
  lines.push('      <p class="twitter-note-author">' + escapeHtml(author) + '</p>');
  lines.push('      <p class="twitter-note-date">' + escapeHtml(date) + '</p>');
  lines.push('    </div>');
  lines.push('  </div>');
  if (tags.length) lines.push('  <p class="twitter-note-tags">' + tags.map(function (tag) { return '#' + escapeHtml(tag.replace(/^#/, '')); }).join(' ') + '</p>');
  if (text) lines.push('  <div class="twitter-note-text">' + escapeHtml(text).replace(/\n/g, '<br>') + '</div>');
  lines = lines.concat(imageGridHtml(images));
  lines.push('</section>');
  var threadId = field('threadId').value.trim();
  var snippet = lines.join('\n') + '\n';
  if (threadId) snippet = '<section class="twitter-thread" data-thread-id="' + escapeAttr(threadId) + '" style="--twitter-thread-bg:' + style.bg + ';--twitter-thread-color:' + style.text + ';">\n<div class="twitter-thread-label">Thread &middot; ' + escapeHtml(threadId) + '</div>\n' + snippet + '</section>\n';
  field('snippetOutput').value = snippet;
  var front = ['---', 'layout: twitter_month', 'title: ' + yamlQuote(month), 'date: ' + month + '-01', 'twitter_font_size: "0.70rem"', 'twitter_dominant_author: ' + yamlQuote(author), 'twitter_accent: ' + yamlQuote(style.indexAccent), 'twitter_accent_text: ' + yamlQuote(style.indexAccentText), 'twitter_index_text: ' + yamlQuote(style.indexText), 'twitter_index_hover: ' + yamlQuote(style.indexHover), 'tags:'];
  if (tags.length) tags.forEach(function (tag) { front.push('  - ' + yamlQuote(tag.replace(/^#/, ''))); }); else front.push('  - memo');
  front.push('---', '');
  field('fileOutput').value = front.join('\n') + '\n' + snippet;
  field('status').textContent = 'Built. Paste the snippet into _twitter/' + month + '.md.';
}
function copyFrom(id) { field(id).focus(); field(id).select(); document.execCommand('copy'); field('status').textContent = 'Copied.'; }
field('date').value = today();
field('month').value = currentMonth();
loadRemembered();
field('author').addEventListener('change', function () { var style = authorStyle(field('author').value); if (!field('avatar').value.trim()) field('avatar').value = style.avatar; saveRemembered(); });
REMEMBERED.forEach(function (id) { if (field(id)) field(id).addEventListener('input', saveRemembered); });
field('buildBtn').addEventListener('click', buildSnippet);
field('copySnippetBtn').addEventListener('click', function () { copyFrom('snippetOutput'); });
field('copyFileBtn').addEventListener('click', function () { copyFrom('fileOutput'); });
if (!field('avatar').value.trim()) field('avatar').value = authorStyle(field('author').value).avatar;
buildSnippet();
</script>
</body>
</html>
