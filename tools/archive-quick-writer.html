<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archive Quick Writer</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #222; }
    main { max-width: 1040px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 24px; margin: 0 0 18px; }
    label { display: block; font-size: 13px; font-weight: 700; margin: 12px 0 6px; }
    input, textarea, select { box-sizing: border-box; width: 100%; border: 1px solid #ccd1d8; border-radius: 8px; padding: 10px 12px; font: inherit; background: #fff; }
    textarea { min-height: 160px; resize: vertical; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .panel { background: #fff; border: 1px solid #e3e6ea; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #4e4a65; color: #e7e3d8; }
    button.secondary { background: #596273; color: #fff; }
    .hint, .status { color: #646b76; font-size: 13px; line-height: 1.55; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Archive Quick Writer</h1>
  <section class="panel">
    <div class="grid">
      <div><label for="title">Log title</label><input id="title" value="201~300"></div>
      <div><label for="category">Category</label><input id="category" value="DM"></div>
      <div><label for="date">Date</label><input id="date" type="date"></div>
      <div><label for="side">Side</label><select id="side"><option value="right">right</option><option value="left">left</option></select></div>
      <div><label for="image">Image path</label><input id="image" placeholder="/dekade-archive/assets/archive/...jpg"></div>
      <div><label for="fileName">File name</label><input id="fileName" value="dm-201-300.html"></div>
    </div>
    <label for="text">Message text</label>
    <textarea id="text" placeholder="Write one bubble here."></textarea>
    <p class="hint">Use this for one new bubble. Copy the bubble snippet into the matching file in _archive. If the date changed, copy the date divider too.</p>
    <div class="actions">
      <button id="buildBtn" type="button">Build bubble</button>
      <button class="secondary" id="copyBubbleBtn" type="button">Copy bubble</button>
      <button class="secondary" id="copyFileBtn" type="button">Copy new-file skeleton</button>
    </div>
    <div class="status" id="status"></div>
  </section>
  <section class="panel">
    <label for="bubbleOutput">Bubble snippet</label>
    <textarea id="bubbleOutput" spellcheck="false"></textarea>
  </section>
  <section class="panel">
    <label for="fileOutput">New-file skeleton</label>
    <textarea id="fileOutput" spellcheck="false"></textarea>
  </section>
</main>
<script>
function today() { return new Date().toISOString().slice(0, 10); }
function escapeHtml(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
function yamlQuote(value) { return '"' + String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"'; }
function field(id) { return document.getElementById(id); }
var STORAGE_KEY = 'dekade-archive-quick-writer';
var REMEMBERED = ['title', 'category', 'side', 'image', 'fileName'];
function loadRemembered() { try { var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); REMEMBERED.forEach(function (id) { if (saved[id] && field(id)) field(id).value = saved[id]; }); } catch (error) {} }
function saveRemembered() { var saved = {}; REMEMBERED.forEach(function (id) { if (field(id)) saved[id] = field(id).value; }); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); } catch (error) {} }
function buildBubble() {
  saveRemembered();
  var date = field('date').value || today();
  var side = field('side').value;
  var text = field('text').value.trim();
  var image = field('image').value.trim();
  var lines = [];
  lines.push('<div class="chat-date-divider">' + escapeHtml(date) + '</div>');
  lines.push('');
  lines.push('<div class="chat-line ' + side + '">');
  lines.push('  <div class="chat-bubble">');
  if (text) lines.push('    <div class="chat-text">' + escapeHtml(text).replace(/\n/g, '<br>') + '</div>');
  if (image) lines.push('    <img class="chat-image" src="' + escapeAttr(image) + '" alt="">');
  lines.push('  </div>');
  lines.push('</div>');
  field('bubbleOutput').value = lines.join('\n') + '\n';
  var front = ['---', 'layout: chatlog_direct', 'title: ' + yamlQuote(field('title').value), 'category: ' + yamlQuote(field('category').value), 'date: ' + date, 'bubble_font_size: "0.70rem"', 'colors:', '  page: "#ffffff"', '  left: "#4e4a65"', '  left_text: "#e7e3d8"', '  right: "#e7e3d8"', '  right_text: "#4e4a65"', '  meta: "#8a8a8a"', '---', ''];
  field('fileOutput').value = front.concat(lines).join('\n') + '\n';
  field('status').textContent = 'Built. Paste the bubble into _archive/' + (field('fileName').value || 'your-file.html') + '.';
}
function copyFrom(id) { field(id).focus(); field(id).select(); document.execCommand('copy'); field('status').textContent = 'Copied.'; }
field('date').value = today();
loadRemembered();
REMEMBERED.forEach(function (id) { if (field(id)) field(id).addEventListener('input', saveRemembered); });
field('buildBtn').addEventListener('click', buildBubble);
field('copyBubbleBtn').addEventListener('click', function () { copyFrom('bubbleOutput'); });
field('copyFileBtn').addEventListener('click', function () { copyFrom('fileOutput'); });
buildBubble();
</script>
</body>
</html>
