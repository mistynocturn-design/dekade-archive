<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Character AU Manager</title>
  <style>
    :root{--accent:#4e4a65;--soft:#e7e3d8;--ink:#161732;--line:#e5e3e8}*{box-sizing:border-box}body{background:#f3f2f4;color:#35313e;font-family:Arial,sans-serif;margin:0}main{margin:0 auto;max-width:1260px;padding:26px 18px 60px}h1{font-size:1.4rem;margin:0 0 18px}h2{font-size:.82rem;margin:0 0 12px;text-transform:uppercase}.layout{display:grid;gap:16px;grid-template-columns:minmax(360px,.9fr) minmax(440px,1.1fr)}.panel{background:#fff;border:1px solid var(--line);border-radius:7px;margin-bottom:14px;padding:15px}.grid{display:grid;gap:10px;grid-template-columns:repeat(2,minmax(0,1fr))}.grid .wide{grid-column:1/-1}label{color:#77727e;display:block;font-size:.67rem;font-weight:700}input,select,textarea{border:1px solid #dcd9df;border-radius:4px;color:#35313e;font:inherit;font-size:.74rem;margin-top:4px;padding:8px;width:100%}textarea{line-height:1.55;min-height:75px;resize:vertical}.tabs,.actions,.filter{display:flex;flex-wrap:wrap;gap:6px}.tabs{border-bottom:1px solid var(--line);margin-bottom:12px;padding-bottom:8px}button{background:var(--accent);border:1px solid var(--accent);border-radius:4px;color:#fff;cursor:pointer;font:inherit;font-size:.68rem;font-weight:700;padding:8px 10px}button.secondary,.tab,.filter button{background:#fff;border-color:#d8d4dc;color:#6f6a76}.tab.active,.filter button.active{background:var(--soft);border-color:var(--soft);color:var(--ink)}.builder{display:none}.builder.active{display:block}.actions{margin-top:10px}.small,.status{color:#918d99;font-size:.64rem;line-height:1.5}.status{min-height:1em;margin-top:8px}.list{display:grid;gap:5px}.item{align-items:center;border:1px solid var(--line);border-radius:5px;display:grid;font-size:.67rem;gap:6px;grid-template-columns:4.5rem minmax(0,1fr) auto;padding:7px}.item>span:first-child{color:#99939c;font-weight:700}.item-actions{display:flex;gap:3px}.item-actions button{background:#fff;border-color:#ddd9df;color:#77727e;padding:4px 6px}.output{min-height:280px;white-space:pre}.preview-wrap{position:sticky;top:14px}.preview{background:#fff;border:1px solid var(--line);border-radius:7px;min-height:520px;padding:17px}.preview-head{border-bottom:1px solid var(--line);margin-bottom:13px;padding-bottom:10px}.preview-head p{color:#99939c;font-size:.62rem;margin:0}.preview-head h3{font-size:1.05rem;margin:4px 0}.preview-tabs{display:flex;gap:13px;margin-bottom:13px}.preview-tabs span{color:#aaa5ad;font-size:.65rem;font-weight:700}.preview-tabs span.active{color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:5px}.profile-grid{display:grid;gap:10px;grid-template-columns:minmax(150px,.8fr) minmax(0,1.2fr)}.box{border:1px solid var(--line);border-radius:6px;padding:10px}.portrait{aspect-ratio:1/1;background:#f5f4f6;overflow:hidden}.portrait img{height:100%;object-fit:cover;width:100%}.facts{display:grid;grid-template-columns:4rem 1fr;margin:9px 0 0}.facts dt,.facts dd{font-size:.62rem;margin:0;padding:3px}.facts dt{color:#88838c;font-weight:700}.stat{align-items:center;display:grid;font-size:.61rem;gap:6px;grid-template-columns:4rem 1fr 2rem;margin:7px 0}.track{background:#eeeaf0;border-radius:99px;height:5px;overflow:hidden}.track i{background:var(--accent);display:block;height:100%}.details{margin-top:10px}.section-title{background:var(--soft);color:var(--ink);display:inline-block;font-size:.62rem;font-weight:700;margin:7px 0 4px;padding:4px 7px}.toggle{background:#fafafa;border:1px solid var(--line);border-radius:5px;font-size:.66rem;margin:5px 0;padding:8px}.entry{border-left:2px solid var(--soft);margin:8px 0;padding:4px 8px}.entry time{color:#99939c;font-size:.58rem}.entry h4{font-size:.72rem;margin:3px 0}.entry p{font-size:.65rem;line-height:1.55;margin:3px 0;white-space:pre-wrap}@media(max-width:920px){.layout{grid-template-columns:1fr}.preview-wrap{position:static}}@media(max-width:560px){.grid,.profile-grid{grid-template-columns:1fr}.grid .wide{grid-column:auto}}
  </style>
</head>
<body>
<main>
  <h1>Character AU Manager</h1>
  <div class="layout">
    <div>
      <section class="panel">
        <h2>AU file</h2>
        <div class="grid">
          <label>Character ID<input id="characterId" placeholder="dietrich-schwartz"></label>
          <label>Parent name<input id="parentTitle" placeholder="Dietrich Schwartz"></label>
          <label>AU title<input id="title" placeholder="Modern AU"></label>
          <label>File name<input id="fileName" placeholder="dietrich-modern-au.md"></label>
          <label>Card order<input id="order" type="number" value="1"></label>
          <label>Subtitle<input id="subtitle"></label>
          <label class="wide">Summary<input id="summary"></label>
          <label>Card image<input id="cardImage" placeholder="/dekade-archive/assets/characters/..."></label>
          <label>Profile image<input id="profileImage" placeholder="/dekade-archive/assets/characters/..."></label>
          <label>Accent<input id="accent" value="#4e4a65"></label>
          <label>Soft<input id="soft" value="#e7e3d8"></label>
          <label>Ink<input id="ink" value="#161732"></label>
          <label>Tab color<input id="tabColor" value="#4e4a65"></label>
          <label>Section text<input id="sectionText" value="#e7e3d8"></label>
        </div>
        <div class="grid" style="margin-top:10px"><label>Draft name<input id="draftName"></label><label>Saved drafts<select id="draftSelect"></select></label></div>
        <div class="actions"><button id="saveDraft" type="button">Save draft</button><button id="loadDraft" class="secondary" type="button">Load selected</button><button id="deleteDraft" class="secondary" type="button">Delete selected</button></div>
        <div class="status" id="draftStatus"></div>
      </section>

      <section class="panel">
        <h2>Add content</h2>
        <div class="tabs">
          <button class="tab active" data-tab="facts" type="button">Card facts</button><button class="tab" data-tab="status" type="button">Status</button><button class="tab" data-tab="details" type="button">Details</button><button class="tab" data-tab="story" type="button">Story</button><button class="tab" data-tab="memo" type="button">Memo</button>
        </div>
        <div class="builder active" data-panel="facts"><div class="grid"><label>Label<input id="factLabel"></label><label>Value<input id="factValue"></label></div><div class="actions"><button id="addFact" type="button">Add card fact</button></div></div>
        <div class="builder" data-panel="status"><div class="grid"><label>Stat label<input id="statLabel"></label><label>Value 0-100<input id="statValue" type="number" min="0" max="100" value="50"></label></div><div class="actions"><button id="addStat" type="button">Add status</button></div></div>
        <div class="builder" data-panel="details"><div class="grid"><label>Section title<input id="detailSection"></label><label>Toggle title<input id="detailTitle"></label><label>Default state<select id="detailOpen"><option value="false">Closed</option><option value="true">Open</option></select></label></div><label>Text<textarea id="detailText"></textarea></label><label>Images<textarea id="detailImages" placeholder="One image path per line"></textarea></label><div class="actions"><button id="addSection" class="secondary" type="button">Add section title</button><button id="addDetail" type="button">Add detail toggle</button></div></div>
        <div class="builder" data-panel="story"><div class="grid"><label>Date or period<input id="storyDate" placeholder="유년기"></label><label>Title<input id="storyTitle"></label></div><label>Text<textarea id="storyText"></textarea></label><div class="actions"><button id="addStory" type="button">Add story</button></div></div>
        <div class="builder" data-panel="memo"><div class="grid"><label>Date<input id="memoDate"></label><label>Title<input id="memoTitle"></label></div><label>Text<textarea id="memoText"></textarea></label><div class="actions"><button id="addMemo" type="button">Add memo</button></div></div>
      </section>

      <section class="panel"><h2>Current items</h2><div class="filter" id="filter"><button class="active" data-filter="all" type="button">All</button><button data-filter="facts" type="button">Facts</button><button data-filter="stats" type="button">Status</button><button data-filter="details" type="button">Details</button><button data-filter="story" type="button">Story</button><button data-filter="memo" type="button">Memo</button></div><div class="list" id="itemList" style="margin-top:9px"></div></section>
      <section class="panel"><h2>Output</h2><textarea class="output" id="output" spellcheck="false"></textarea><div class="actions"><button id="copy" type="button">Copy Markdown</button><button id="download" class="secondary" type="button">Download .md</button></div><div class="status" id="status"></div></section>
    </div>
    <aside class="preview-wrap"><section class="preview"><h2>Preview</h2><div id="preview"></div></section></aside>
  </div>
</main>
<script>
(function(){
  'use strict';
  var STORAGE='dekade-character-au-drafts-v1';
  var data={facts:[],stats:[],details:[],story:[],memo:[]},editing=null,activeTab='facts',activeFilter='all';
  var metaIds=['characterId','parentTitle','title','fileName','order','subtitle','summary','cardImage','profileImage','accent','soft','ink','tabColor','sectionText'];
  function el(id){return document.getElementById(id)} function val(id){return el(id).value.trim()} function set(id,value){el(id).value=value==null?'':value}
  function esc(value){return String(value==null?'':value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
  function yaml(value){return JSON.stringify(String(value==null?'':value))} function slug(value){return String(value||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'character-au'}
  function lines(value){return String(value||'').split(/\r?\n/).map(function(x){return x.trim()}).filter(Boolean)}
  function meta(){var out={};metaIds.forEach(function(id){out[id]=val(id)});return out}
  function setTab(name){activeTab=name;document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x.dataset.tab===name)});document.querySelectorAll('.builder').forEach(function(x){x.classList.toggle('active',x.dataset.panel===name)});renderPreview()}
  document.querySelectorAll('.tab').forEach(function(tab){tab.onclick=function(){setTab(tab.dataset.tab)}});
  function commit(type,item){if(editing&&editing.type===type){data[type][editing.index]=item;editing=null}else data[type].push(item);clearForm(type);updateAll()}
  function clearForm(type){var ids={facts:['factLabel','factValue'],stats:['statLabel'],details:['detailSection','detailTitle','detailText','detailImages'],story:['storyDate','storyTitle','storyText'],memo:['memoDate','memoTitle','memoText']}[type]||[];ids.forEach(function(id){set(id,'')})}
  el('addFact').onclick=function(){commit('facts',{label:val('factLabel')||'Item',value:val('factValue')})};
  el('addStat').onclick=function(){commit('stats',{label:val('statLabel')||'STAT',value:Math.max(0,Math.min(100,Number(val('statValue'))||0))})};
  el('addSection').onclick=function(){commit('details',{type:'section',title:val('detailSection')||'SECTION'})};
  el('addDetail').onclick=function(){commit('details',{type:'toggle',title:val('detailTitle')||'Detail',open:val('detailOpen')==='true',text:val('detailText'),images:lines(val('detailImages'))})};
  el('addStory').onclick=function(){commit('story',{date:val('storyDate'),title:val('storyTitle')||'Story',text:val('storyText')})};
  el('addMemo').onclick=function(){commit('memo',{date:val('memoDate'),title:val('memoTitle'),text:val('memoText')})};
  function label(type,item){if(type==='facts')return item.label+' | '+item.value;if(type==='stats')return item.label+' | '+item.value;if(type==='details')return(item.type==='section'?'Section | ':'Toggle | ')+item.title;if(type==='story')return(item.date?item.date+' | ':'')+item.title;return(item.date?item.date+' | ':'')+(item.title||item.text)}
  function renderList(){var html='';Object.keys(data).forEach(function(type){if(activeFilter!=='all'&&activeFilter!==type)return;data[type].forEach(function(item,index){html+='<div class="item"><span>'+esc(type)+'</span><span>'+esc(label(type,item))+'</span><span class="item-actions"><button data-action="up" data-type="'+type+'" data-index="'+index+'">↑</button><button data-action="down" data-type="'+type+'" data-index="'+index+'">↓</button><button data-action="edit" data-type="'+type+'" data-index="'+index+'">Edit</button><button data-action="remove" data-type="'+type+'" data-index="'+index+'">×</button></span></div>'})});el('itemList').innerHTML=html||'<p class="small">No items.</p>'}
  el('filter').onclick=function(event){var button=event.target.closest('[data-filter]');if(!button)return;activeFilter=button.dataset.filter;el('filter').querySelectorAll('button').forEach(function(x){x.classList.toggle('active',x===button)});renderList()};
  el('itemList').onclick=function(event){var button=event.target.closest('[data-action]');if(!button)return;var type=button.dataset.type,index=Number(button.dataset.index),array=data[type],action=button.dataset.action;if(action==='remove')array.splice(index,1);if(action==='up'&&index>0){var x=array[index-1];array[index-1]=array[index];array[index]=x}if(action==='down'&&index<array.length-1){var y=array[index+1];array[index+1]=array[index];array[index]=y}if(action==='edit'){editing={type:type,index:index};fillEdit(type,array[index]);return}updateAll()};
  function fillEdit(type,item){setTab(type==='stats'?'status':type);if(type==='facts'){set('factLabel',item.label);set('factValue',item.value)}if(type==='stats'){set('statLabel',item.label);set('statValue',item.value)}if(type==='details'){if(item.type==='section')set('detailSection',item.title);else{set('detailTitle',item.title);set('detailOpen',String(item.open));set('detailText',item.text);set('detailImages',(item.images||[]).join('\n'))}}if(type==='story'){set('storyDate',item.date);set('storyTitle',item.title);set('storyText',item.text)}if(type==='memo'){set('memoDate',item.date);set('memoTitle',item.title);set('memoText',item.text)}}
  function buildYaml(){var m=meta(),out=['---','layout: character_au','character_id: '+yaml(m.characterId),'parent_title: '+yaml(m.parentTitle),'title: '+yaml(m.title),'subtitle: '+yaml(m.subtitle),'summary: '+yaml(m.summary),'order: '+(Number(m.order)||1),'accent: '+yaml(m.accent),'soft: '+yaml(m.soft),'ink: '+yaml(m.ink),'tab_color: '+yaml(m.tabColor),'section_text: '+yaml(m.sectionText),'card_image: '+yaml(m.cardImage),'profile_image: '+yaml(m.profileImage)];if(data.facts.length){out.push('card_facts:');data.facts.forEach(function(x){out.push('  - label: '+yaml(x.label),'    value: '+yaml(x.value))})}if(data.stats.length){out.push('stats:');data.stats.forEach(function(x){out.push('  - label: '+yaml(x.label),'    value: '+x.value)})}if(data.details.length){out.push('details:');data.details.forEach(function(x){out.push('  - title: '+yaml(x.title));if(x.type==='section')out.push('    type: "section"');else{out.push('    open: '+(x.open?'true':'false'),'    text: '+yaml(x.text));if(x.images&&x.images.length){out.push('    images:');x.images.forEach(function(image){out.push('      - '+yaml(image))})}}})}if(data.story.length){out.push('story:');data.story.forEach(function(x){out.push('  - date: '+yaml(x.date),'    title: '+yaml(x.title),'    text: '+yaml(x.text))})}if(data.memo.length){out.push('memo:');data.memo.forEach(function(x){out.push('  - date: '+yaml(x.date),'    title: '+yaml(x.title),'    text: '+yaml(x.text))})}out.push('---','');return out.join('\n')}
  function portrait(m){var src=m.profileImage||m.cardImage;return'<div class="portrait">'+(src?'<img src="'+esc(src)+'" alt="">':'')+'</div><dl class="facts">'+data.facts.map(function(x){return'<dt>'+esc(x.label)+'</dt><dd>'+esc(x.value)+'</dd>'}).join('')+'</dl>'}
  function stats(){return'<div class="box"><div class="section-title">STATUS</div>'+data.stats.map(function(x){return'<div class="stat"><span>'+esc(x.label)+'</span><div class="track"><i style="width:'+x.value+'%"></i></div><strong>'+x.value+'</strong></div>'}).join('')+'</div>'}
  function details(){return'<div class="box details">'+data.details.map(function(x){return x.type==='section'?'<div class="section-title">'+esc(x.title)+'</div>':'<div class="toggle"><strong>'+esc(x.title)+'</strong><div class="small" style="white-space:pre-wrap;margin-top:5px">'+esc(x.text)+'</div></div>'}).join('')+'</div>'}
  function entries(items){return items.map(function(x){return'<article class="entry"><time>'+esc(x.date)+'</time>'+(x.title?'<h4>'+esc(x.title)+'</h4>':'')+'<p>'+esc(x.text)+'</p></article>'}).join('')||'<p class="small">No items.</p>'}
  function renderPreview(){var m=meta(),body='';if(activeTab==='story')body=entries(data.story);else if(activeTab==='memo')body=entries(data.memo);else body='<div class="profile-grid"><div class="box">'+portrait(m)+'</div>'+stats()+'</div>'+details();el('preview').innerHTML='<header class="preview-head"><p>ALTERNATE UNIVERSE</p><h3>'+esc(m.title||'AU title')+'</h3><p>'+esc(m.subtitle)+'</p></header><div class="preview-tabs"><span class="'+(activeTab!=='story'&&activeTab!=='memo'?'active':'')+'">PROFILE</span><span class="'+(activeTab==='story'?'active':'')+'">STORY</span><span class="'+(activeTab==='memo'?'active':'')+'">MEMO</span></div>'+body;document.documentElement.style.setProperty('--accent',m.accent||'#4e4a65');document.documentElement.style.setProperty('--soft',m.soft||'#e7e3d8');document.documentElement.style.setProperty('--ink',m.ink||'#161732')}
  function updateAll(){renderList();renderPreview();el('output').value=buildYaml()}
  metaIds.forEach(function(id){el(id).addEventListener('input',function(){if(id==='title'&&!val('fileName'))set('fileName',slug(val('characterId')+'-'+val('title'))+'.md');updateAll()})});
  function drafts(){try{return JSON.parse(localStorage.getItem(STORAGE)||'{}')}catch(e){return{}}}function refreshDrafts(){var all=drafts(),names=Object.keys(all);el('draftSelect').innerHTML=names.map(function(name){return'<option>'+esc(name)+'</option>'}).join('')}
  el('saveDraft').onclick=function(){var name=val('draftName')||val('title')||'AU draft',all=drafts();all[name]={meta:meta(),data:data};localStorage.setItem(STORAGE,JSON.stringify(all));refreshDrafts();el('draftSelect').value=name;el('draftStatus').textContent='Draft saved: '+name};
  el('loadDraft').onclick=function(){var saved=drafts()[val('draftSelect')];if(!saved)return;metaIds.forEach(function(id){set(id,saved.meta[id])});data=saved.data||{facts:[],stats:[],details:[],story:[],memo:[]};updateAll();el('draftStatus').textContent='Draft loaded.'};
  el('deleteDraft').onclick=function(){var all=drafts(),name=val('draftSelect');delete all[name];localStorage.setItem(STORAGE,JSON.stringify(all));refreshDrafts();el('draftStatus').textContent='Draft deleted.'};
  el('copy').onclick=async function(){await navigator.clipboard.writeText(buildYaml());el('status').textContent='Markdown copied.'};
  el('download').onclick=function(){var blob=new Blob([buildYaml()],{type:'text/markdown;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=(val('fileName')||'character-au.md').replace(/\.md$/,'')+'.md';a.click();setTimeout(function(){URL.revokeObjectURL(url)},1000)};
  var query=new URLSearchParams(location.search);if(query.get('character'))set('characterId',query.get('character'));refreshDrafts();updateAll();
})();
</script>
</body>
</html>
