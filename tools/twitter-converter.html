<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twitter Archive Converter</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #222; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 24px; margin: 0 0 18px; }
    label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 6px; }
    input, textarea { box-sizing: border-box; width: 100%; border: 1px solid #ccd1d8; border-radius: 8px; padding: 10px 12px; font: inherit; background: #fff; }
    textarea { min-height: 230px; resize: vertical; white-space: pre; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .panel { background: #fff; border: 1px solid #e3e6ea; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #4e4a65; color: #e7e3d8; }
    button.secondary { background: #596273; color: #fff; }
    .hint { color: #646b76; font-size: 13px; line-height: 1.55; margin: 8px 0 0; }
    .status { font-size: 13px; color: #4e4a65; min-height: 20px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Twitter Archive Converter</h1>

  <section class="panel">
    <div class="grid">
      <div><label for="title">Month title</label><input id="title" value="2026-06"></div>
      <div><label for="date">Archive sort date</label><input id="date" value="2026-06-01" placeholder="YYYY-MM-01"></div>
    </div>
  </section>

  <section class="panel">
    <label for="input">Paste spreadsheet rows</label>
    <textarea id="input" placeholder="Copy columns A:E from Google Sheets, then paste here."></textarea>
    <p class="hint">Expected columns: date, author, profile image, tags, content. Multiline cells and spreadsheet quotes are handled here.</p>
    <div class="actions">
      <button id="convertBtn" type="button">Convert</button>
      <button class="secondary" id="copyBtn" type="button">Copy output</button>
    </div>
    <div class="status" id="status"></div>
  </section>

  <section class="panel">
    <label for="output">Output for _twitter/YYYY-MM.md</label>
    <textarea id="output" spellcheck="false"></textarea>
  </section>
</main>

<script>
function parseTsv(text) {
  var rows = [];
  var row = [];
  var cell = '';
  var quoted = false;

  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    var next = text[i + 1];

    if (quoted) {
      if (ch === '"' && next === '"') {
        cell += '"';
        i++;
      } else if (ch === '"') {
        quoted = false;
      } else {
        cell += ch;
      }
      continue;
    }

    if (ch === '"' && cell === '') quoted = true;
    else if (ch === '\t') { row.push(cell); cell = ''; }
    else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
    else if (ch !== '\r') cell += ch;
  }

  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  return rows.filter(function (r) { return r.some(function (c) { return String(c).trim() !== ''; }); });
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/'/g, '&#39;');
}

function normalizeDate(value) {
  var text = String(value || '').trim();
  if (!text) return '';
  var date = new Date(text);
  if (!isNaN(date.getTime()) && /^\d{4}[-/.]\d{1,2}[-/.]\d{1,2}/.test(text)) return date.toISOString().slice(0, 10);
  return text.replace(/\./g, '-');
}

function cleanText(value) {
  return String(value || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
}

function splitTags(value) {
  return String(value || '')
    .split(/[;,，、]/)
    .map(function (tag) { return tag.trim().replace(/^#/, ''); })
    .filter(Boolean);
}

function yamlQuote(value) {
  return '"' + String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\"') + '"';
}

function noteHtml(row) {
  var date = normalizeDate(row[0]);
  var author = String(row[1] || '').trim();
  var avatar = String(row[2] || '').trim();
  var tags = splitTags(row[3]);
  var text = cleanText(row[4]);
  if (!date && !author && !text) return '';

  var html = [];
  html.push('<section class="twitter-note" data-date="' + escapeAttr(date) + '" data-author="' + escapeAttr(author) + '" data-tags="' + escapeAttr(tags.join(' ')) + '">');
  html.push('  <div class="twitter-note-header">');
  if (avatar) {
    html.push('    <img class="twitter-note-avatar" src="' + escapeAttr(avatar) + '" alt="">');
  } else {
    html.push('    <div class="twitter-note-avatar twitter-author-placeholder">' + escapeHtml(author ? author.charAt(0) : 'A') + '</div>');
  }
  html.push('    <div>');
  html.push('      <p class="twitter-note-author">' + escapeHtml(author || 'Unknown') + '</p>');
  html.push('      <p class="twitter-note-date">' + escapeHtml(date) + '</p>');
  html.push('    </div>');
  html.push('  </div>');
  if (tags.length) {
    html.push('  <p class="twitter-note-tags">' + tags.map(function (tag) { return '#' + escapeHtml(tag); }).join(' ') + '</p>');
  }
  if (text) {
    html.push('  <div class="twitter-note-text">' + escapeHtml(text).replace(/\n/g, '<br>') + '</div>');
  }
  html.push('</section>');
  return html.join('\n');
}

function buildOutput() {
  var rows = parseTsv(document.getElementById('input').value);
  if (rows.length && String(rows[0][0] || '').trim() === '작성일') rows.shift();

  var allTags = [];
  var notes = [];
  rows.forEach(function (row) {
    splitTags(row[3]).forEach(function (tag) {
      if (allTags.indexOf(tag) === -1) allTags.push(tag);
    });
    var html = noteHtml(row);
    if (html) notes.push(html);
  });

  var frontMatter = [
    '---',
    'layout: twitter_month',
    'title: ' + yamlQuote(document.getElementById('title').value),
    'date: ' + document.getElementById('date').value,
    'tags:'
  ];

  if (allTags.length) {
    allTags.forEach(function (tag) { frontMatter.push('  - ' + yamlQuote(tag)); });
  } else {
    frontMatter.push('  - memo');
  }
  frontMatter.push('---', '');

  document.getElementById('output').value = frontMatter.concat(notes).join('\n\n').trim() + '\n';
  document.getElementById('status').textContent = notes.length + ' notes converted.';
}

document.getElementById('convertBtn').addEventListener('click', buildOutput);
document.getElementById('copyBtn').addEventListener('click', function () {
  var output = document.getElementById('output');
  output.focus();
  output.select();
  document.execCommand('copy');
  document.getElementById('status').textContent = 'Copied output.';
});
</script>
</body>
</html>
