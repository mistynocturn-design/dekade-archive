<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home Editor</title><style>
:root{--ink:#29272e;--muted:#817c84;--line:#dedbe0;--paper:#f4f3f2;--accent:#685867}*{box-sizing:border-box}body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0}main{margin:0 auto;max-width:1180px;padding:26px 18px 60px}h1{font-size:1.45rem;margin:0 0 9px}.guide,.panel,.preview{background:#fff;border:1px solid var(--line);border-radius:7px}.guide{margin-bottom:15px;padding:0 13px}.guide summary{color:var(--muted);cursor:pointer;font-size:.7rem;font-weight:750;padding:10px 0}.guide ol{color:var(--muted);font-size:.68rem;line-height:1.75;margin:0 0 12px;padding-left:20px}.layout{display:grid;gap:16px;grid-template-columns:minmax(390px,.85fr) minmax(430px,1.15fr)}.panel{padding:15px}.grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}label{color:#716d76;display:block;font-size:.67rem;font-weight:750}input,select,textarea{background:#fff;border:1px solid #d7d3d9;border-radius:4px;color:var(--ink);font:inherit;font-size:.75rem;margin-top:5px;padding:8px 9px;width:100%}textarea{line-height:1.55;min-height:68px;resize:vertical}.colors{display:grid;gap:10px;grid-template-columns:repeat(3,1fr)}.colors input{height:38px;padding:3px}.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}button{background:var(--accent);border:1px solid var(--accent);border-radius:4px;color:#fff;cursor:pointer;font:inherit;font-size:.68rem;font-weight:750;padding:8px 10px}button.secondary{background:#fff;border-color:#cbc7ce;color:#69646e}.status,.small{color:var(--muted);font-size:.64rem;line-height:1.5}.status{min-height:1em;margin-top:8px}.preview-wrap{position:sticky;top:14px}.preview{overflow:hidden}.hero{aspect-ratio:16/10;background:#ded9dc;display:grid;position:relative}.hero img{grid-area:1/1;height:100%;margin:0;object-fit:cover;width:100%}.shade{background:linear-gradient(90deg,rgba(20,18,22,.78),rgba(20,18,22,.12));grid-area:1/1}.copy{align-self:end;color:#fff;grid-area:1/1;max-width:70%;padding:clamp(24px,6vw,55px);position:relative}.copy small{font-size:.6rem;font-weight:800;letter-spacing:.14em}.copy h2{font-size:clamp(2rem,6vw,4.2rem);line-height:.95;margin:.35rem 0 .7rem}.copy p{font-size:.75rem;margin:.2rem 0}.mock{display:grid;gap:12px;grid-template-columns:1fr 1fr;padding:16px}.mock div{background:#f7f5f4;border:1px solid #ebe7e9;border-radius:5px;height:75px;padding:10px}.output{font-family:Consolas,monospace;min-height:190px;margin-top:14px;width:100%}@media(max-width:850px){.layout{grid-template-columns:1fr}.preview-wrap{position:static}}@media(max-width:520px){.grid,.colors{grid-template-columns:1fr}.wide{grid-column:auto}}
</style></head><body><main><h1>Home Editor</h1><details class="guide"><summary>이용방법</summary><ol><li>대문 이미지를 repo의 <code>assets/home/</code>에 넣습니다. JPG, PNG, GIF, WebP를 사용할 수 있습니다.</li><li>Windows 전체 경로나 repo의 이미지 경로를 입력합니다.</li><li>문구·색상·이미지 위치를 조정하고 Preview를 확인합니다.</li><li>Download home.yml을 누른 뒤 repo의 <code>_data/home.yml</code>을 교체하고 Commit/Push합니다.</li></ol></details><div class="layout"><section class="panel"><div class="grid"><label class="wide">Hero image path<input id="heroImage" placeholder="C:\Users\yooji\Documents\dekade-archive\assets\home\hero.gif"></label><label>Image position<select id="heroPosition"><option value="center">Center</option><option value="top">Top</option><option value="bottom">Bottom</option><option value="left">Left</option><option value="right">Right</option></select></label><label>Kicker<input id="kicker"></label><label class="wide">Title<input id="title"></label><label class="wide">Subtitle<input id="subtitle"></label><label class="wide">Archive label<input id="archiveSince"></label><label class="wide">Dietrich note<textarea id="dietrichNote"></textarea></label><label class="wide">Katia note<textarea id="katiaNote"></textarea></label><div class="wide colors"><label>Accent<input id="accent" type="color"></label><label>Soft<input id="soft" type="color"></label><label>Ink<input id="ink" type="color"></label></div></div><div class="actions"><button id="download" type="button">Download home.yml</button><button id="copy" class="secondary" type="button">Copy YAML</button><button id="reset" class="secondary" type="button">Reset</button></div><div class="status" id="status"></div><textarea class="output" id="output" readonly></textarea></section><aside class="preview-wrap"><section class="preview"><div class="hero"><img id="previewImage" alt=""><span class="shade"></span><div class="copy"><small id="previewKicker"></small><h2 id="previewTitle"></h2><p id="previewSubtitle"></p><p id="previewSince"></p></div></div><div class="mock"><div>RECENT TRACES</div><div>ARCHIVE INDEX</div></div></section></aside></div></main><script>
(function(){'use strict';var KEY='dekade-home-editor-v1',defaults={heroImage:'/dekade-archive/assets/gallery/Noctea/04.jpg',heroPosition:'center',kicker:'PRIVATE ARCHIVE',title:'DKade',subtitle:'Dietrich Schwartz × Katia Feltroof',archiveSince:'ARCHIVE SINCE 2026',dietrichNote:'A long-lived witness learning how to remain beside someone.',katiaNote:'A quiet scientist choosing a life beyond survival.',accent:'#685867',soft:'#eee8e5',ink:'#29272e'},ids=Object.keys(defaults);function el(id){return document.getElementById(id)}function value(id){return el(id).value.trim()}function set(id,v){el(id).value=v==null?'':v}function yaml(v){return JSON.stringify(String(v==null?'':v))}function imagePath(v){var path=String(v||'').trim().replace(/^['"]|['"]$/g,'').replace(/[\\₩]+/g,'/');if(!path)return'';var marker=path.toLowerCase().indexOf('/assets/');if(marker>=0)path=path.slice(marker+1);else if(path.toLowerCase().indexOf('assets/')!==0)throw new Error('repo의 assets 폴더 안에 있는 이미지 경로를 입력해주세요.');if(!/\.(jpe?g|png|gif|webp)$/i.test(path))throw new Error('JPG, PNG, GIF 또는 WebP 이미지를 사용해주세요.');return'/dekade-archive/'+path.replace(/^\/+/,'').replace(/\/{2,}/g,'/')}function data(){var out={};ids.forEach(function(id){out[id]=value(id)});return out}function build(){var d=data(),path='';try{path=imagePath(d.heroImage);el('status').textContent=''}catch(error){el('status').textContent=error.message}var text=['hero_image: '+yaml(path),'hero_position: '+yaml(d.heroPosition),'kicker: '+yaml(d.kicker),'title: '+yaml(d.title),'subtitle: '+yaml(d.subtitle),'archive_since: '+yaml(d.archiveSince),'accent: '+yaml(d.accent),'soft: '+yaml(d.soft),'ink: '+yaml(d.ink),'dietrich_note: '+yaml(d.dietrichNote),'katia_note: '+yaml(d.katiaNote),''].join('\n');el('output').value=text;return text}function render(){var d=data(),path;try{path=imagePath(d.heroImage)}catch(error){path=''}el('previewImage').src=path;el('previewImage').style.objectPosition=d.heroPosition;el('previewKicker').textContent=d.kicker;el('previewTitle').textContent=d.title;el('previewSubtitle').textContent=d.subtitle;el('previewSince').textContent=d.archiveSince;document.documentElement.style.setProperty('--accent',d.accent);build();localStorage.setItem(KEY,JSON.stringify(d))}ids.forEach(function(id){el(id).addEventListener('input',render)});el('copy').onclick=async function(){try{await navigator.clipboard.writeText(build())}catch(error){el('output').select();document.execCommand('copy')}el('status').textContent='YAML copied.'};el('download').onclick=function(){var blob=new Blob([build()],{type:'text/yaml;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='home.yml';a.click();setTimeout(function(){URL.revokeObjectURL(url)},1000)};el('reset').onclick=function(){if(!confirm('Home 설정을 기본값으로 되돌릴까요?'))return;ids.forEach(function(id){set(id,defaults[id])});render()};var saved;try{saved=JSON.parse(localStorage.getItem(KEY)||'null')}catch(error){};ids.forEach(function(id){set(id,saved&&saved[id]!=null?saved[id]:defaults[id])});render()})();
</script></body></html>
