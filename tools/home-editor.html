<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home Editor</title><style>
:root{--ink:#29272e;--muted:#817c84;--line:#dedbe0;--paper:#f4f3f2;--accent:#685867;--gradient:#121115;--kicker:#fff;--title:#fff;--subtitle:#fff;--archive:#fff}*{box-sizing:border-box}body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0}main{margin:0 auto;max-width:1240px;padding:24px 18px 60px}h1{font-size:1.4rem}.guide,.panel,.preview{background:#fff;border:1px solid var(--line);border-radius:7px}.guide{margin-bottom:14px;padding:0 13px}.guide summary{cursor:pointer;font-size:.7rem;font-weight:750;padding:10px 0}.guide ol{color:var(--muted);font-size:.68rem;line-height:1.7}.layout{display:grid;gap:16px;grid-template-columns:minmax(410px,.86fr) minmax(470px,1.14fr)}.panel,.preview{padding:15px}.grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}label{color:#716d76;display:block;font-size:.67rem;font-weight:750}input,textarea{border:1px solid #d7d3d9;border-radius:4px;font:inherit;font-size:.75rem;margin-top:5px;padding:8px 9px;width:100%}textarea{min-height:62px}.check{align-items:center;display:flex;gap:.45rem;margin-top:1.3rem}.check input{margin:0;width:auto}.colors{display:grid;gap:8px;grid-template-columns:repeat(4,1fr)}.colors.site{grid-template-columns:repeat(3,1fr)}input[type=color]{height:38px;padding:3px}.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}button{background:var(--accent);border:1px solid var(--accent);border-radius:4px;color:#fff;cursor:pointer;font-size:.68rem;font-weight:750;padding:8px 10px}button.secondary{background:#fff;border-color:#cbc7ce;color:#69646e}.status,.small{color:var(--muted);font-size:.64rem}.output{font-family:Consolas,monospace;min-height:230px;margin-top:12px}.preview-wrap{position:sticky;top:12px}.preview h2{font-size:.66rem;letter-spacing:.08em;margin:0 0 7px}.crop-map{background:#222;height:285px;overflow:hidden;position:relative}.crop-map img{height:100%;margin:0;object-fit:contain;width:100%}.crop-frame{border:2px solid #fff;box-shadow:0 0 0 9999px rgba(6,5,7,.74);cursor:grab;position:absolute;touch-action:none}.crop-frame.dragging{cursor:grabbing}.hero{aspect-ratio:16/9;background:#222;margin-top:14px;overflow:hidden;position:relative}.hero>img{margin:0;max-width:none;object-fit:fill;position:absolute;z-index:0}.shade{background:linear-gradient(90deg,color-mix(in srgb,var(--gradient) 86%,transparent),transparent 78%);inset:0;position:absolute;z-index:2}.shade.off{display:none}.copy{bottom:0;left:0;max-width:65%;padding:clamp(12px,4vw,32px);position:absolute;z-index:4}.copy small{color:var(--kicker);font-size:.48rem;font-weight:800}.copy h3{color:var(--title);font-size:clamp(1.5rem,6vw,3.7rem);line-height:1;margin:.2rem 0}.copy p{font-size:.58rem;margin:.12rem 0}.subtitle{color:var(--subtitle)}.archive{color:var(--archive)}@media(max-width:900px){.layout{grid-template-columns:1fr}.preview-wrap{position:static}}@media(max-width:560px){.grid,.colors,.colors.site{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.crop-map{height:220px}}
</style></head><body><main><h1>Home Editor</h1><details class="guide"><summary>이용방법</summary><ol><li>CROP MAP에는 원본 전체가 표시됩니다.</li><li>흰색 16:9 프레임을 끌어 위치를 바꾸고 Crop zoom으로 크기를 조절합니다.</li><li>FINAL PREVIEW에는 실제 메인에 보일 선택 영역만 표시됩니다.</li><li>설정을 마치면 <code>home.yml</code>을 내려받아 교체합니다.</li></ol></details><div class="layout"><section class="panel"><div class="grid">
<label class="wide">Hero image path<input id="heroImage"></label><input id="cropX" type="hidden"><input id="cropY" type="hidden"><label>Crop position<input id="cropPosition" readonly></label><label>Crop zoom<input id="cropZoom" type="range" min="1" max="4" step="0.05"></label><label class="check">Use gradient<input id="heroGradient" type="checkbox"></label><label>Gradient color<input id="heroGradientColor" type="color"></label>
<label>Kicker<input id="kicker"></label><label class="wide">Title<input id="title"></label><label class="wide">Subtitle<input id="subtitle"></label><label class="wide">Archive label<input id="archiveSince"></label><div class="wide colors"><label>Kicker<input id="kickerColor" type="color"></label><label>Title<input id="titleColor" type="color"></label><label>Subtitle<input id="subtitleColor" type="color"></label><label>Archive<input id="archiveColor" type="color"></label></div>
<label class="wide">Dietrich note<textarea id="dietrichNote"></textarea></label><label class="wide">Katia note<textarea id="katiaNote"></textarea></label><div class="wide colors site"><label>Accent<input id="accent" type="color"></label><label>Soft<input id="soft" type="color"></label><label>Ink<input id="ink" type="color"></label></div></div><div class="actions"><button id="download">Download home.yml</button><button id="copy" class="secondary">Copy YAML</button><button id="center" class="secondary">Center crop</button><button id="reset" class="secondary">Reset all</button></div><div class="status" id="status"></div><textarea class="output" id="output" readonly></textarea></section>
<aside class="preview-wrap"><section class="preview"><h2>CROP MAP — FULL IMAGE</h2><div class="crop-map" id="cropMap"><img id="cropImage" alt=""><span class="crop-frame" id="cropFrame"></span></div><p class="small">흰색 안쪽만 실제 대문에 나타납니다.</p><h2>FINAL PREVIEW — SELECTED CROP</h2><div class="hero" id="finalHero"><img id="previewImage" alt=""><span class="shade" id="previewShade"></span><div class="copy"><small id="previewKicker"></small><h3 id="previewTitle"></h3><p class="subtitle" id="previewSubtitle"></p><p class="archive" id="previewSince"></p></div></div></section></aside></div></main>
<script>
(function(){'use strict';var KEY='dekade-home-editor-v4',D={heroImage:'/dekade-archive/assets/gallery/Noctea/03.png',cropX:50,cropY:50,cropZoom:1.5,heroGradient:true,heroGradientColor:'#121115',kickerColor:'#ffffff',titleColor:'#ffffff',subtitleColor:'#ffffff',archiveColor:'#ffffff',kicker:'PRIVATE ARCHIVE',title:'DKade',subtitle:'Dietrich Schwartz × Katia Feltroof',archiveSince:'ARCHIVE SINCE 2026',dietrichNote:'#염세주의 #냉소 #능글 #인간혐오 #잔정많음 #전직군인 #강화인간',katiaNote:'#무표정 #무심 #수준급_전투실력 #똑똑한박사님 #사회성부족 #유머없음 #외강내유',accent:'#685867',soft:'#eee8e5',ink:'#29272e'},ids=Object.keys(D),G=null,drag=null,$=function(id){return document.getElementById(id)};function get(id){return id==='heroGradient'?$(id).checked:$(id).value.trim()}function set(id,v){if(id==='heroGradient')$(id).checked=v===true||v==='true';else $(id).value=v}function n(id){return Number(get(id))||0}function clamp(v){return Math.max(0,Math.min(100,v))}function path(v){var p=String(v||'').trim().replace(/[\\₩]+/g,'/'),i=p.toLowerCase().indexOf('/assets/');if(i>=0)p=p.slice(i+1);else if(!p.toLowerCase().startsWith('assets/'))throw Error('assets 폴더 안의 경로를 입력해주세요.');if(!/\.(jpe?g|png|gif|webp)$/i.test(p))throw Error('이미지 형식을 확인해주세요.');return'/dekade-archive/'+p.replace(/^\/+/,'')}function model(){var o={};ids.forEach(function(id){o[id]=get(id)});return o}function maxCrop(nw,nh,ratio){return nw/nh>ratio?{w:nh*ratio,h:nh}:{w:nw,h:nw/ratio}}function cropData(nw,nh,ratio){var m=maxCrop(nw,nh,ratio),z=Math.max(1,n('cropZoom')),w=m.w/z,h=m.h/z;return{x:(nw-w)*n('cropX')/100,y:(nh-h)*n('cropY')/100,w:w,h:h}}function mapGeometry(){var map=$('cropMap'),im=$('cropImage'),nw=im.naturalWidth,nh=im.naturalHeight;if(!nw||!nh)return null;var s=Math.min(map.clientWidth/nw,map.clientHeight/nh),c=cropData(nw,nh,16/9);return{scale:s,left:(map.clientWidth-nw*s)/2+c.x*s,top:(map.clientHeight-nh*s)/2+c.y*s,w:c.w*s,h:c.h*s,rangeX:(nw-c.w)*s,rangeY:(nh-c.h)*s}}function drawMap(){G=mapGeometry();if(!G)return;var f=$('cropFrame');f.style.cssText+=';left:'+G.left+'px;top:'+G.top+'px;width:'+G.w+'px;height:'+G.h+'px'}function drawFinal(){var im=$('previewImage'),box=$('finalHero'),nw=im.naturalWidth,nh=im.naturalHeight;if(!nw||!nh||!box.clientWidth)return;var c=cropData(nw,nh,box.clientWidth/box.clientHeight),s=box.clientWidth/c.w;im.style.width=nw*s+'px';im.style.height=nh*s+'px';im.style.left=-c.x*s+'px';im.style.top=-c.y*s+'px'}function yaml(v){return JSON.stringify(String(v))}function build(){var d=model(),p='';try{p=path(d.heroImage);$('status').textContent=''}catch(e){$('status').textContent=e.message}var out=['hero_image: '+yaml(p),'hero_position: '+yaml(d.cropX+'% '+d.cropY+'%'),'hero_crop_x: '+Number(d.cropX),'hero_crop_y: '+Number(d.cropY),'hero_crop_zoom: '+Number(d.cropZoom),'hero_gradient: '+(d.heroGradient?'true':'false'),'hero_gradient_color: '+yaml(d.heroGradientColor),'kicker_color: '+yaml(d.kickerColor),'title_color: '+yaml(d.titleColor),'subtitle_color: '+yaml(d.subtitleColor),'archive_color: '+yaml(d.archiveColor),'kicker: '+yaml(d.kicker),'title: '+yaml(d.title),'subtitle: '+yaml(d.subtitle),'archive_since: '+yaml(d.archiveSince),'accent: '+yaml(d.accent),'soft: '+yaml(d.soft),'ink: '+yaml(d.ink),'dietrich_note: '+yaml(d.dietrichNote),'katia_note: '+yaml(d.katiaNote),''].join('\n');$('output').value=out;return out}function render(){var d=model(),p='';try{p=path(d.heroImage)}catch(e){}if($('cropImage').getAttribute('src')!==p){$('cropImage').src=p;$('previewImage').src=p}$('cropPosition').value=Number(d.cropX).toFixed(1)+'% / '+Number(d.cropY).toFixed(1)+'%';$('previewShade').classList.toggle('off',!d.heroGradient);[['--gradient',d.heroGradientColor],['--kicker',d.kickerColor],['--title',d.titleColor],['--subtitle',d.subtitleColor],['--archive',d.archiveColor],['--accent',d.accent]].forEach(function(x){document.documentElement.style.setProperty(x[0],x[1])});$('previewKicker').textContent=d.kicker;$('previewTitle').textContent=d.title;$('previewSubtitle').textContent=d.subtitle;$('previewSince').textContent=d.archiveSince;build();localStorage.setItem(KEY,JSON.stringify(d));requestAnimationFrame(function(){drawMap();drawFinal()})}ids.forEach(function(id){$(id).addEventListener('input',render)});$('cropImage').addEventListener('load',drawMap);$('previewImage').addEventListener('load',drawFinal);window.addEventListener('resize',function(){drawMap();drawFinal()});var frame=$('cropFrame');frame.addEventListener('pointerdown',function(e){G=mapGeometry();drag={x:e.clientX,y:e.clientY,cx:n('cropX'),cy:n('cropY')};frame.setPointerCapture(e.pointerId);frame.classList.add('dragging')});frame.addEventListener('pointermove',function(e){if(!drag||!G)return;set('cropX',G.rangeX?clamp(drag.cx+(e.clientX-drag.x)/G.rangeX*100):50);set('cropY',G.rangeY?clamp(drag.cy+(e.clientY-drag.y)/G.rangeY*100):50);render()});function end(){drag=null;frame.classList.remove('dragging')}frame.addEventListener('pointerup',end);frame.addEventListener('pointercancel',end);$('center').onclick=function(){set('cropX',50);set('cropY',50);render()};$('copy').onclick=async function(){try{await navigator.clipboard.writeText(build())}catch(e){}$('status').textContent='YAML copied.'};$('download').onclick=function(){var u=URL.createObjectURL(new Blob([build()],{type:'text/yaml'})),a=document.createElement('a');a.href=u;a.download='home.yml';a.click();setTimeout(function(){URL.revokeObjectURL(u)},1000)};$('reset').onclick=function(){if(confirm('모든 설정을 초기화할까요?')){ids.forEach(function(id){set(id,D[id])});render()}};var saved;try{saved=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){}ids.forEach(function(id){set(id,saved&&saved[id]!=null?saved[id]:D[id])});render()})();
</script>
<script>(function(){var grid=document.querySelector('.panel .grid'),gradient=document.getElementById('heroGradientColor').parentElement,wrap=document.createElement('div');wrap.className='wide';wrap.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';wrap.innerHTML='<label>Text position<select id="textPosition" style="margin-top:5px;padding:8px 9px;width:100%"><option value="top-left">좌측 상단</option><option value="top-right">우측 상단</option><option value="bottom-left">좌측 하단</option><option value="bottom-right">우측 하단</option></select></label><label>Gradient opacity<input id="gradientOpacity" type="range" min="0" max="100" step="1"></label>';gradient.after(wrap);var position=document.getElementById('textPosition'),opacity=document.getElementById('gradientOpacity'),hero=document.getElementById('finalHero'),shade=document.getElementById('previewShade'),KEY='dekade-home-editor-extra-v1',saved;try{saved=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){}position.value=saved&&saved.position||'bottom-left';opacity.value=saved&&saved.opacity!=null?saved.opacity:86;function patchOutput(){var output=document.getElementById('output'),text=output.value.replace(/\nhero_text_position:[^\n]*/g,'').replace(/\nhero_gradient_opacity:[^\n]*/g,'');text=text.replace(/(hero_gradient_color:[^\n]*)/,'$1\nhero_gradient_opacity: '+Number(opacity.value)+'\nhero_text_position: '+JSON.stringify(position.value));output.value=text;return text}function apply(){hero.classList.remove('text-top-left','text-top-right','text-bottom-left','text-bottom-right');hero.classList.add('text-'+position.value);var direction=position.value.indexOf('right')>=0?'270deg':'90deg';shade.style.background='linear-gradient('+direction+',color-mix(in srgb,var(--gradient) '+opacity.value+'%,transparent),transparent 78%)';localStorage.setItem(KEY,JSON.stringify({position:position.value,opacity:Number(opacity.value)}));patchOutput()}document.querySelectorAll('input,textarea').forEach(function(input){input.addEventListener('input',function(){setTimeout(apply,0)})});position.addEventListener('input',apply);opacity.addEventListener('input',apply);document.getElementById('reset').addEventListener('click',function(){setTimeout(function(){position.value='bottom-left';opacity.value=86;apply()},0)});document.getElementById('copy').addEventListener('click',function(event){event.preventDefault();event.stopImmediatePropagation();var text=patchOutput();navigator.clipboard.writeText(text);document.getElementById('status').textContent='YAML copied.'},true);document.getElementById('download').addEventListener('click',function(event){event.preventDefault();event.stopImmediatePropagation();var url=URL.createObjectURL(new Blob([patchOutput()],{type:'text/yaml'})),a=document.createElement('a');a.href=url;a.download='home.yml';a.click();setTimeout(function(){URL.revokeObjectURL(url)},1000)},true);apply()})();</script>
<script>(function(){var style=document.createElement('style');style.textContent='.hero.text-top-left .copy{bottom:auto;top:0}.hero.text-top-right .copy{bottom:auto;left:auto;right:0;text-align:right;top:0}.hero.text-bottom-right .copy{left:auto;right:0;text-align:right}';document.head.appendChild(style)})();</script>
