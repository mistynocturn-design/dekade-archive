<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home Editor</title><style>
:root{--ink:#29272e;--muted:#817c84;--line:#dedbe0;--paper:#f4f3f2;--accent:#685867;--gradient:#121115;--kicker:#fff;--title:#fff;--subtitle:#fff;--archive:#fff}*{box-sizing:border-box}body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0}main{margin:0 auto;max-width:1240px;padding:26px 18px 60px}h1{font-size:1.45rem;margin:0 0 9px}.guide,.panel,.preview{background:#fff;border:1px solid var(--line);border-radius:7px}.guide{margin-bottom:15px;padding:0 13px}.guide summary{color:var(--muted);cursor:pointer;font-size:.7rem;font-weight:750;padding:10px 0}.guide ol{color:var(--muted);font-size:.68rem;line-height:1.75;margin:0 0 12px;padding-left:20px}.layout{display:grid;gap:16px;grid-template-columns:minmax(410px,.86fr) minmax(470px,1.14fr)}.panel{padding:15px}.grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}label{color:#716d76;display:block;font-size:.67rem;font-weight:750}input,textarea{background:#fff;border:1px solid #d7d3d9;border-radius:4px;color:var(--ink);font:inherit;font-size:.75rem;margin-top:5px;padding:8px 9px;width:100%}textarea{line-height:1.55;min-height:68px;resize:vertical}.check{align-items:center;display:flex;gap:.45rem;margin-top:1.3rem}.check input{margin:0;width:auto}.colors{display:grid;gap:10px;grid-template-columns:repeat(4,1fr)}.colors.site{grid-template-columns:repeat(3,1fr)}.colors input,#heroGradientColor{height:38px;padding:3px}.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}button{background:var(--accent);border:1px solid var(--accent);border-radius:4px;color:#fff;cursor:pointer;font:inherit;font-size:.68rem;font-weight:750;padding:8px 10px}button.secondary{background:#fff;border-color:#cbc7ce;color:#69646e}.crop-button{margin-top:5px;width:100%}.status,.small{color:var(--muted);font-size:.64rem;line-height:1.5}.status{min-height:1em;margin-top:8px}.preview-wrap{position:sticky;top:14px}.preview{overflow:hidden;padding:14px}.preview h2{font-size:.68rem;letter-spacing:.08em;margin:0 0 8px}.crop-map{background:#222;display:grid;height:270px;overflow:hidden;position:relative}.crop-map img{height:100%;margin:0;object-fit:contain;pointer-events:none;user-select:none;width:100%}.crop-frame{border:2px solid #fff;box-shadow:0 0 0 9999px rgba(8,7,9,.72);cursor:grab;position:absolute;touch-action:none}.crop-frame.dragging{cursor:grabbing}.hero{aspect-ratio:16/9;background:#ded9dc;display:grid;margin-top:14px;overflow:hidden;position:relative}.hero img{grid-area:1/1;height:100%;margin:0;object-fit:cover;width:100%}.shade{background:linear-gradient(90deg,color-mix(in srgb,var(--gradient) 86%,transparent),color-mix(in srgb,var(--gradient) 8%,transparent));grid-area:1/1}.shade.off{display:none}.copy{align-self:end;grid-area:1/1;max-width:68%;padding:clamp(14px,4vw,34px);position:relative}.copy small{color:var(--kicker);font-size:.5rem;font-weight:800;letter-spacing:.14em}.copy h3{color:var(--title);font-size:clamp(1.8rem,6vw,4rem);line-height:1.04;margin:.2rem 0 .35rem}.copy p{font-size:.62rem;margin:.12rem 0}.copy .subtitle{color:var(--subtitle)}.copy .archive{color:var(--archive)}.output{font-family:Consolas,monospace;min-height:230px;margin-top:14px;width:100%}@media(max-width:900px){.layout{grid-template-columns:1fr}.preview-wrap{position:static}}@media(max-width:560px){.grid,.colors,.colors.site{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.crop-map{height:220px}}
</style></head><body><main><h1>Home Editor</h1><details class="guide"><summary>이용방법</summary><ol><li>이미지 경로를 입력합니다. JPG, PNG, GIF, WebP를 지원합니다.</li><li>전체 이미지에서 흰색 16:9 프레임을 끌어 크롭 영역을 선택합니다.</li><li>아래 Final preview에서 모든 화면에 동일하게 표시될 가로형 대문을 확인합니다.</li><li>그라데이션과 각 문구 색상을 설정하고 <code>home.yml</code>을 내려받습니다.</li></ol></details><div class="layout"><section class="panel"><div class="grid">
<label class="wide">Hero image path<input id="heroImage" placeholder="C:\Users\yooji\Documents\dekade-archive\assets\home\hero.gif"></label><label>Crop position<input id="heroPosition" readonly></label><label>Reset crop<button id="centerCrop" class="secondary crop-button" type="button">Center</button></label><label class="check">Use gradient<input id="heroGradient" type="checkbox"></label><label>Gradient color<input id="heroGradientColor" type="color"></label>
<label>Kicker<input id="kicker"></label><label class="wide">Title<input id="title"></label><label class="wide">Subtitle<input id="subtitle"></label><label class="wide">Archive label<input id="archiveSince"></label>
<div class="wide colors"><label>Kicker color<input id="kickerColor" type="color"></label><label>Title color<input id="titleColor" type="color"></label><label>Subtitle color<input id="subtitleColor" type="color"></label><label>Archive color<input id="archiveColor" type="color"></label></div>
<label class="wide">Dietrich note<textarea id="dietrichNote"></textarea></label><label class="wide">Katia note<textarea id="katiaNote"></textarea></label><div class="wide colors site"><label>Accent<input id="accent" type="color"></label><label>Soft<input id="soft" type="color"></label><label>Ink<input id="ink" type="color"></label></div></div>
<div class="actions"><button id="download" type="button">Download home.yml</button><button id="copy" class="secondary" type="button">Copy YAML</button><button id="reset" class="secondary" type="button">Reset</button></div><div class="status" id="status"></div><textarea class="output" id="output" readonly></textarea></section>
<aside class="preview-wrap"><section class="preview"><h2>CROP MAP</h2><div class="crop-map" id="cropMap"><img id="cropImage" draggable="false" alt=""><span class="crop-frame" id="cropFrame"></span></div><p class="small">흰색 프레임 안쪽이 실제 대문에 보이는 영역입니다.</p><h2>FINAL PREVIEW</h2><div class="hero"><img id="previewImage" alt=""><span class="shade" id="previewShade"></span><div class="copy"><small id="previewKicker"></small><h3 id="previewTitle"></h3><p class="subtitle" id="previewSubtitle"></p><p class="archive" id="previewSince"></p></div></div></section></aside></div></main>
<script>
(function(){'use strict';var KEY='dekade-home-editor-v3',defaults={heroImage:'/dekade-archive/assets/gallery/Noctea/03.png',heroPosition:'50% 50%',heroGradient:true,heroGradientColor:'#121115',kickerColor:'#ffffff',titleColor:'#ffffff',subtitleColor:'#ffffff',archiveColor:'#ffffff',kicker:'PRIVATE ARCHIVE',title:'DKade',subtitle:'Dietrich Schwartz × Katia Feltroof',archiveSince:'ARCHIVE SINCE 2026',dietrichNote:'#염세주의 #냉소 #능글 #인간혐오 #잔정많음 #전직군인 #강화인간',katiaNote:'#무표정 #무심 #수준급_전투실력 #똑똑한박사님 #사회성부족 #유머없음 #외강내유',accent:'#685867',soft:'#eee8e5',ink:'#29272e'},ids=Object.keys(defaults),geometry=null,drag=null;function el(id){return document.getElementById(id)}function value(id){return id==='heroGradient'?el(id).checked:el(id).value.trim()}function set(id,v){if(id==='heroGradient')el(id).checked=v===true||v==='true';else el(id).value=v==null?'':v}function yaml(v){return JSON.stringify(String(v==null?'':v))}function clamp(v){return Math.max(0,Math.min(100,v))}function pos(v){var m=String(v||'').match(/([\d.]+)%\s+([\d.]+)%/);return m?[Number(m[1]),Number(m[2])]:[50,50]}function imagePath(v){var path=String(v||'').trim().replace(/^['"]|['"]$/g,'').replace(/[\\₩]+/g,'/');if(!path)return'';var marker=path.toLowerCase().indexOf('/assets/');if(marker>=0)path=path.slice(marker+1);else if(path.toLowerCase().indexOf('assets/')!==0)throw new Error('repo의 assets 폴더 안에 있는 이미지 경로를 입력해주세요.');if(!/\.(jpe?g|png|gif|webp)$/i.test(path))throw new Error('JPG, PNG, GIF 또는 WebP 이미지를 사용해주세요.');return'/dekade-archive/'+path.replace(/^\/+/,'').replace(/\/{2,}/g,'/')}function data(){var out={};ids.forEach(function(id){out[id]=value(id)});return out}function build(){var d=data(),path='';try{path=imagePath(d.heroImage);el('status').textContent=''}catch(error){el('status').textContent=error.message}var text=['hero_image: '+yaml(path),'hero_position: '+yaml(d.heroPosition),'hero_gradient: '+(d.heroGradient?'true':'false'),'hero_gradient_color: '+yaml(d.heroGradientColor),'kicker_color: '+yaml(d.kickerColor),'title_color: '+yaml(d.titleColor),'subtitle_color: '+yaml(d.subtitleColor),'archive_color: '+yaml(d.archiveColor),'kicker: '+yaml(d.kicker),'title: '+yaml(d.title),'subtitle: '+yaml(d.subtitle),'archive_since: '+yaml(d.archiveSince),'accent: '+yaml(d.accent),'soft: '+yaml(d.soft),'ink: '+yaml(d.ink),'dietrich_note: '+yaml(d.dietrichNote),'katia_note: '+yaml(d.katiaNote),''].join('\n');el('output').value=text;return text}function cropGeometry(){var map=el('cropMap'),image=el('cropImage'),mw=map.clientWidth,mh=map.clientHeight,nw=image.naturalWidth,nh=image.naturalHeight;if(!mw||!mh||!nw||!nh)return null;var scale=Math.min(mw/nw,mh/nh),iw=nw*scale,ih=nh*scale,ratio=16/9,cw,ch;if(iw/ih>ratio){ch=ih;cw=ch*ratio}else{cw=iw;ch=cw/ratio}return{baseLeft:(mw-iw)/2,baseTop:(mh-ih)/2,imageWidth:iw,imageHeight:ih,width:cw,height:ch,overflowX:iw-cw,overflowY:ih-ch}}function updateFrame(){geometry=cropGeometry();if(!geometry)return;var p=pos(value('heroPosition')),frame=el('cropFrame');frame.style.left=(geometry.baseLeft+geometry.overflowX*p[0]/100)+'px';frame.style.top=(geometry.baseTop+geometry.overflowY*p[1]/100)+'px';frame.style.width=geometry.width+'px';frame.style.height=geometry.height+'px'}function render(){var d=data(),path='';try{path=imagePath(d.heroImage)}catch(error){}el('cropImage').src=path;el('previewImage').src=path;el('previewImage').style.objectPosition=d.heroPosition||'50% 50%';el('previewShade').classList.toggle('off',!d.heroGradient);[['--gradient',d.heroGradientColor],['--kicker',d.kickerColor],['--title',d.titleColor],['--subtitle',d.subtitleColor],['--archive',d.archiveColor],['--accent',d.accent]].forEach(function(pair){document.documentElement.style.setProperty(pair[0],pair[1])});el('previewKicker').textContent=d.kicker;el('previewTitle').textContent=d.title;el('previewSubtitle').textContent=d.subtitle;el('previewSince').textContent=d.archiveSince;build();localStorage.setItem(KEY,JSON.stringify(d));requestAnimationFrame(updateFrame)}ids.forEach(function(id){el(id).addEventListener('input',render)});el('cropImage').addEventListener('load',updateFrame);window.addEventListener('resize',updateFrame);el('centerCrop').onclick=function(){set('heroPosition','50% 50%');render()};var frame=el('cropFrame');frame.addEventListener('pointerdown',function(event){var p=pos(value('heroPosition'));geometry=cropGeometry();drag={clientX:event.clientX,clientY:event.clientY,x:p[0],y:p[1]};frame.setPointerCapture(event.pointerId);frame.classList.add('dragging')});frame.addEventListener('pointermove',function(event){if(!drag||!geometry)return;var x=geometry.overflowX?clamp(drag.x+(event.clientX-drag.clientX)/geometry.overflowX*100):50,y=geometry.overflowY?clamp(drag.y+(event.clientY-drag.clientY)/geometry.overflowY*100):50;set('heroPosition',x.toFixed(1)+'% '+y.toFixed(1)+'%');render()});function end(){drag=null;frame.classList.remove('dragging')}frame.addEventListener('pointerup',end);frame.addEventListener('pointercancel',end);el('copy').onclick=async function(){try{await navigator.clipboard.writeText(build())}catch(error){el('output').select();document.execCommand('copy')}el('status').textContent='YAML copied.'};el('download').onclick=function(){var blob=new Blob([build()],{type:'text/yaml;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='home.yml';a.click();setTimeout(function(){URL.revokeObjectURL(url)},1000)};el('reset').onclick=function(){if(!confirm('Home 설정을 기본값으로 되돌릴까요?'))return;ids.forEach(function(id){set(id,defaults[id])});render()};var saved;try{saved=JSON.parse(localStorage.getItem(KEY)||'null')}catch(error){}ids.forEach(function(id){set(id,saved&&saved[id]!=null?saved[id]:defaults[id])});render()})();
</script></body></html>
