# Dependencies
markdown:         kramdown
highlighter:      rouge

# Permalinks
permalink:        pretty

# Setup
title:            DKade
tagline:          'A Jekyll theme'
description:      'Dietrich Schwartz<br>♡<br>Katia Feltroof'
baseurl: "/dekade-archive"
url: https://mistynocturn-design.github.io
timezone: Asia/Seoul

paginate:         5

# Custom vars
version:          2.1.0

github:
  repo:           https://github.com/poole/hyde

# Site collections
collections:
  characters:
    output: true
    permalink: /characters/:name/
  twitter:
    output: true
    permalink: /twitter/:name/
  archive:
    output: true
    permalink: /archive/:name/
  roleplays:
    output: true
    permalink: /roleplay/:name/
  character_aus:
    output: true
    permalink: /character-au/:name/
  gallery:
    output: false
  writings:
    output: true
    permalink: /writings/:name/
  trpg:
    output: true
    permalink: /trpg/:name/
  world_aus:
    output: true
    permalink: /world/alternates/:name/
