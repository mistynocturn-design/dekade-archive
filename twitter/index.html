---
layout: page
title: Twitter
---

<div class="twitter-index">
  {% assign months = site.twitter | sort: "date" | reverse %}
  {% for month in months %}
    <article class="twitter-month-card">
      <a class="twitter-month-link" href="{{ month.url | relative_url }}">
        <div class="twitter-month-profile">
          <div class="twitter-month-avatar twitter-author-placeholder">{{ month.date | date: "%m" }}</div>
          <div>
            <h2>{{ month.title }}</h2>
          </div>
        </div>
        {% if month.tags %}
          <div class="twitter-tags twitter-index-tags">
            {% for tag in month.tags %}
              <span>#{{ tag }}</span>
            {% endfor %}
          </div>
        {% endif %}
      </a>
    </article>
  {% endfor %}
</div>
