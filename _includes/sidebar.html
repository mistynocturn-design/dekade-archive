<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <h1>
        <a href="{{ site.baseurl }}">
          {{ site.title }}
        </a>
      </h1>
      <p class="lead">{{ site.description }}</p>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/">Home</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/world/">World</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/characters/">Characters</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/archive/">Archive</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/roleplay/">Roleplay</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/gallery/">Gallery</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/writings/">Writings</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/checklist/">Pair/Check</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/twitter/">Twitter</a>
      <a class="sidebar-nav-item" href="{{ site.baseurl }}/trpg/">TRPG</a>
    </nav>
  </div>
</div>
<script>
(function () {
  var body = document.body;
  if (!body || !document.querySelector('.home-page')) return;
  document.querySelectorAll('.sidebar-nav-item').forEach(function (link) {
    link.addEventListener('click', function (event) {
      var href = link.href;
      if (!href || link.getAttribute('href') === window.location.pathname) return;
      if (event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
      event.preventDefault();
      body.classList.add('sidebar-collapsing');
      window.setTimeout(function () {
        window.location.href = href;
      }, 420);
    });
  });
})();
</script>
