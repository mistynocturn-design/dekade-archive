<section class="trpg-music-player" data-trpg-player aria-label="{{ page.title }} 배경음악 플레이어" style="--player-bg:{{ page.player_bg | default: '#f7f8fc' }};--player-accent:{{ page.player_accent | default: page.accent | default: '#8ca7d8' }};--player-text:{{ page.player_text | default: '#242735' }};">
  <audio data-audio preload="metadata"></audio>

  <div class="trpg-player-head">
    <div class="trpg-player-copy">
      <strong data-track-title>재생목록이 비어 있습니다</strong>
      <small data-scene-name>장면 미지정</small>
    </div>
    <div class="trpg-player-eq" data-equalizer aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <button type="button" class="trpg-player-more" data-action="more" aria-expanded="false" aria-label="상세 기능 펼치기">＋</button>
  </div>

  <div class="trpg-player-progress">
    <span data-current-time>0:00</span><i><b data-progress></b></i><span data-duration>0:00</span>
  </div>

  <div class="trpg-player-controls">
    <button type="button" class="trpg-player-repeat" data-action="repeat-cycle" data-repeat-mode="none" aria-label="반복 없음" title="반복 없음">↻<sup data-repeat-mark>×</sup></button>
    <button type="button" data-action="prev" aria-label="이전곡">◀◀</button>
    <button type="button" class="trpg-player-play" data-action="toggle" aria-label="재생"><span data-play-icon>▶</span></button>
    <button type="button" data-action="next" aria-label="다음곡">▶▶</button>
    <button type="button" class="trpg-player-volume-button" data-action="volume" aria-expanded="false" aria-label="볼륨 조절">♪</button>
  </div>
  <div class="trpg-player-volume-popover" data-volume-panel hidden><label aria-label="볼륨"><span>♪</span><input type="range" min="0" max="1" step="0.01" value="0.7" data-volume><output data-volume-value>70%</output></label></div>

  <div class="trpg-player-popover" data-panel hidden>
    <header><strong>PLAYLIST</strong><span>전체 재생목록</span></header>
    <ol data-playlist></ol>
    <p class="trpg-player-empty" data-empty>등록된 곡이 없습니다.<br>TRPG 에디터에서 MP3 경로를 추가해 주세요.</p>
  </div>

  <script type="application/json" data-playlist-data>[{% for track in page.playlist %}{"title":{{ track.title | jsonify }},"scene":{{ track.scene | default: "장면 미지정" | jsonify }},"src":{{ track.file | relative_url | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}]</script>
</section>
